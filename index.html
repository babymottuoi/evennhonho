<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event kênh</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --dtu: #8b0000;
        }

        /* CĂN CHỈNH TOÀN MÀN HÌNH */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f4;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            /* Chống tràn ngang */
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* CONTAINER TỰ CO GIÃN */
        .container {
            background: white;
            width: 92%;
            /* Chiếm 92% chiều rộng màn hình mobile */
            max-width: 500px;
            /* Không quá rộng trên PC */
            padding: 20px;
            border-radius: 15px;
            border-top: 8px solid var(--dtu);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
            /* Quan trọng để padding không làm tràn khung */
        }

        /* TIÊU ĐỀ */
        h2 {
            font-size: 1.5rem;
            color: var(--dtu);
            text-align: center;
            margin-top: 0;
        }

        h3 {
            font-size: 1.2rem;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        /* NÚT BẤM */
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--dtu);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:disabled {
            background: #ccc;
        }

        /* CÁC Ô LỰA CHỌN CÂU HỎI */
        .option {
            display: flex;
            align-items: center;
            padding: 12px;
            margin: 10px 0;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            word-break: break-word;
            /* Tự xuống dòng nếu nội dung quá dài */
        }

        .option input {
            margin-right: 10px;
            min-width: 18px;
            min-height: 18px;
        }

        /* FORM NHẬP LIỆU */
        input,
        select {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 2px solid #ddd;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--dtu);
        }

        label {
            font-size: 0.9rem;
            color: #555;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .hidden {
            display: none;
        }

        .timer {
            text-align: center;
            color: #d32f2f;
            font-weight: bold;
            font-size: 1.4rem;
            margin-bottom: 15px;
            background: #ffebee;
            padding: 10px;
            border-radius: 8px;
        }

        /* ĐIỀU CHỈNH RIÊNG CHO MÀN HÌNH CỰC NHỎ */
        @media (max-width: 350px) {
            .container {
                padding: 15px;
            }

            h2 {
                font-size: 1.2rem;
            }

            .btn {
                padding: 12px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body oncontextmenu="return false;" ondragstart="return false;">
    <div class="container">
        <div id="step-start">
            <h2>Event kênh🎓DTU Official Community🗂</h2>
            <p id="system-msg" style="text-align:center; font-size: 0.9rem; color: #666; font-weight: bold;"></p>
            <div id="form-input">
                <label>Họ và tên:</label>
                <input type="text" id="fullname" placeholder="Nguyễn Văn A" autocomplete="off"
                    oninput="formatName(this)">
                <label>Mã số sinh viên (MSSV):</label>
                <input type="text" id="mssv" placeholder="Nhập mã số sinh viên" maxlength="15"
                    oninput="this.value = this.value.replace(/[^0-9]/g, '')" autocomplete="off">
                <label>Username Telegram:</label>
                <input type="text" id="user_input" value="@" autocomplete="off" oninput="fixUsername(this)">
                <label>Nhà mạng nhận thưởng:</label>
                <select id="provider">
                    <option value="" disabled selected>-- Chọn nhà mạng --</option>
                    <option value="Viettel">Viettel</option>
                    <option value="Vinaphone">Vinaphone</option>
                    <option value="Mobifone">Mobifone</option>
                </select>
            </div>
            <button class="btn" id="btn-main-action" onclick="startApp()">ĐANG KIỂM TRA...</button>
        </div>

        <div id="step-quiz" class="hidden">
            <div class="timer" id="clock">0.00s</div>
            <div id="quiz-content"></div>
            <button class="btn" id="btn-next" onclick="handleNext()">TIẾP THEO</button>
        </div>

        <div id="step-end" class="hidden" style="text-align:center">
            <h1 style="font-size: 4rem; margin: 0;">🎉</h1>
            <h2 style="color: green;">NỘP BÀI THÀNH CÔNG!</h2>
            <button class="btn" onclick="tg.close()">ĐÓNG ỨNG DỤNG</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();

        const CONFIG = {
            SCRIPT_URL: "https://script.google.com/macros/s/AKfycbwfKG2imb8_m0sAb0kNynV-H6VvnaYv2FU1g63Lw4MJ2FIwLEz9S6OW6_CF3seyhbBx/exec",
            START_TIME: 0, END_TIME: 0, NUM_QUESTIONS: 4
        };

        const soundWin = new Audio('https://www.myinstants.com/media/sounds/tada.mp3');
        const BANK = [
            { q: "Đại học Duy Tân thành lập vào ngày tháng năm nào?", opts: ["11/11/1994", "19/05/1994", "02/09/1994", "20/11/1994", "30/04/1994", "15/10/1994"], ans: "11/11/1994" },
            { q: "Ai là người sáng lập Đại học Duy Tân?", opts: ["NGƯT. Anh hùng Lao động Lê Công Cơ", "GS. Ngô Bảo Châu", "TS. Lê Nguyên Bảo", "Ông Huỳnh Cách Mạng", "Bà Nguyễn Thị Bình", "Ông Nguyễn Xuân Phúc"], ans: "NGƯT. Anh hùng Lao động Lê Công Cơ" },
            { q: "DTU đạt chuẩn kiểm định ABET (Mỹ) cho khối ngành nào đầu tiên?", opts: ["Công nghệ Thông tin", "Du lịch", "Y dược", "Kiến trúc", "Ngôn ngữ Anh", "Luật"], ans: "Công nghệ Thông tin" },
            { q: "Biểu tượng (Logo) của DTU có hình ảnh gì chủ đạo?", opts: ["Ngọn đuốc", "Quyển sách", "Chim lạc", "Bản đồ Việt Nam", "Cánh én", "Cánh chim"], ans: "Ngọn đuốc" },
            { q: "Năm 2026, DTU nằm trong top bao nhiêu của BXH QS World University Rankings?", opts: ["Top 500", "Top 100", "Top 1000", "Top 10", "Top 2000", "Top 50"], ans: "Top 500" },
            { q: "Địa chỉ cơ sở của DTU tại Hòa Khánh là đường nào?", opts: ["Nguyễn Lương Bằng", "110 Hoàng Minh Thảo", "100 Hoàng Minh Thảo", "Tôn Đức Thắng", "120 Hoàng Minh Thảo", "Nguyễn Tất Thành"], ans: "120 Hoàng Minh Thảo" },
            { q: "Tên gọi 'Duy Tân' được lấy cảm hứng từ phong trào lịch sử nào?", opts: ["Phong trào Duy Tân", "Phong trào Cần Vương", "Phong trào Đông Du", "Khởi nghĩa Yên Thế", "Xô Viết Nghệ Tĩnh", "Cách mạng Tháng 8"], ans: "Phong trào Duy Tân" },
            { q: "Hiệu trưởng hiện nay (năm 2026) của Đại học Duy Tân là ai?", opts: ["TS. Lê Nguyên Bảo", "NGƯT. Lê Công Cơ", "GS. Trần Diệp Tuấn", "TS. Võ Thanh Hải", "TS. Nguyễn Hữu Phú", "GS. Lim Sang Taek"], ans: "TS. Lê Nguyên Bảo" },
            { q: "Cơ sở đào tạo Y Dược của DTU nằm ở cơ sở nào?", opts: ["K7/25 Quang Trung", "03 Quang Trung", "254 Nguyễn Văn Linh", "209 Phan Thanh", "3.5ha Hòa Khánh Nam"], ans: "3.5ha Hòa Khánh Nam" },
            { q: "DTU có bao nhiêu cơ sở đào tạo tại Đà Nẵng tính đến 2026?", opts: ["5 cơ sở", "3 cơ sở", "6 cơ sở", "2 cơ sở", "7 cơ sở", "4 cơ sở"], ans: "7 cơ sở" },
            { q: "Khẩu hiệu (Slogan) của Đại học Duy Tân là gì?", opts: ["Tất cả vì quyền lợi học tập và việc làm của sinh viên", "Chất lượng là danh dự", "Học tập để phục vụ", "Vươn ra thế giới", "Đổi mới và sáng tạo", "Hợp tác cùng phát triển"], ans: "Tất cả vì quyền lợi học tập và việc làm của sinh viên" },
            { q: "Tạp chí khoa học của DTU có tên là gì?", opts: ["DTU Journal of Science and Technology", "Duy Tan News", "Khoa học & Đời sống", "Tạp chí Giáo dục", "Tạp chí Kinh tế", "Tạp chí Công nghệ"], ans: "DTU Journal of Science and Technology" },
            { q: "Sân bóng đá của DTU nằm ở cơ sở nào?", opts: ["Cơ sở Hòa Khánh", "Cơ sở Phan Thanh", "Cơ sở Quang Trung", "Cơ sở Nguyễn Văn Linh", "Cơ sở Phan Thanh", "Cơ sở Phan Văn Trị"], ans: "Cơ sở Hòa Khánh" },
            { q: "Ngành học nào sau đây tại DTU có hợp tác với Đại học Carnegie Mellon (CMU)?", opts: ["Công nghệ phần mềm", "Kế toán", "Luật", "Y đa khoa", "Kiến trúc", "Xây dựng"], ans: "Công nghệ phần mềm" },
            { q: "DTU đạt giải Nhất cuộc thi CDIO Academy quốc tế lần đầu vào năm nào?", opts: ["2013", "2010", "2015", "2018", "2020", "2024"], ans: "2013" },
            { q: "Cơ sở Quang Trung của DTU nằm gần địa danh nào nhất?", opts: ["Ga Đà Nẵng", "Cầu Rồng", "Sân bay Đà Nẵng", "Cầu sông Hàn", "Biển Mỹ Khê", "Bán đảo Sơn Trà"], ans: "Cầu sông Hàn" },
            { q: "Hệ đào tạo từ xa của DTU có tên là gì?", opts: ["eDTU", "Duy Tan Online", "DTU Distance Learning", "DTU-eUni", "Global DTU", "Open DTU"], ans: "DTU-eUni" },
            { q: "DTU chính thức nhận Huân chương Lao động hạng Nhất vào năm nào?", opts: ["2019", "2014", "2024", "2009", "1999", "2025"], ans: "2019" },
            { q: "Thư viện điện tử của DTU cung cấp quyền truy cập vào cơ sở dữ liệu nào?", opts: ["SpringerLink", "Netflix", "Facebook", "Wikipedia", "Youtube", "Tiktok"], ans: "SpringerLink" },
            { q: "Màu sắc truyền thống nhận diện thương hiệu DTU là màu gì?", opts: ["Đỏ đô", "Đỏ thẳm", "Đỏ", "Xanh lá", "Tím", "Cam"], ans: "Đỏ đô" }
        ];

        let score = 0, currentIdx = 0, startTime, timerInterval, myQuestions = [];

        function formatName(input) {
            let cursor = input.selectionStart;
            input.value = input.value.toLowerCase().replace(/(^|\s)\S/g, l => l.toUpperCase());
            input.setSelectionRange(cursor, cursor);
        }

        function fixUsername(input) {
            if (!input.value.startsWith("@")) input.value = "@" + input.value.replace(/@/g, "");
            input.value = input.value.replace(/\s/g, "");
        }

        async function loadSystemConfig() {
            try {
                const res = await fetch(CONFIG.SCRIPT_URL);
                const data = await res.json();
                CONFIG.START_TIME = data.start; CONFIG.END_TIME = data.end;
                initStatus();
            } catch (e) { document.getElementById('system-msg').innerText = "Lỗi kết nối!"; }
        }
        loadSystemConfig();

        function initStatus() {
            const check = () => {
                const now = Date.now();
                const btn = document.getElementById('btn-main-action');
                if (now < CONFIG.START_TIME) { btn.disabled = true; btn.innerText = "CHƯA ĐẾN GIỜ"; }
                else if (now > CONFIG.END_TIME) { btn.disabled = true; btn.innerText = "HẾT GIỜ"; }
                else { btn.disabled = false; btn.innerText = "BẮT ĐẦU"; }
            };
            check(); setInterval(check, 1000);
        }

        function startApp() {
            const name = document.getElementById('fullname').value.trim();
            const mssv = document.getElementById('mssv').value.trim();
            const uInput = document.getElementById('user_input').value.trim();
            const provider = document.getElementById('provider').value;
            if (!name || !mssv || uInput === "@" || !provider) return alert("Vui lòng nhập đủ!");

            myQuestions = [...BANK].sort(() => 0.5 - Math.random()).slice(0, CONFIG.NUM_QUESTIONS);
            document.getElementById('step-start').classList.add('hidden');
            document.getElementById('step-quiz').classList.remove('hidden');

            startTime = Date.now();
            timerInterval = setInterval(() => { document.getElementById('clock').innerText = ((Date.now() - startTime) / 1000).toFixed(2) + "s"; }, 100);
            render();
        }

        function render() {
            const item = myQuestions[currentIdx];
            const opts = [...item.opts].sort(() => 0.5 - Math.random());
            let html = `<h3>Câu ${currentIdx + 1}: ${item.q}</h3>`;
            opts.forEach(o => { html += `<label class="option"><input type="radio" name="quiz" value="${o}"> <span>${o}</span></label>`; });
            document.getElementById('quiz-content').innerHTML = html;
        }

        function handleNext() {
            const sel = document.querySelector('input[name="quiz"]:checked');
            if (!sel) return alert("Chọn đáp án!");
            if (sel.value === myQuestions[currentIdx].ans) score++;
            if (currentIdx < myQuestions.length - 1) { currentIdx++; render(); }
            else { submit(); }
        }

        async function submit() {
            clearInterval(timerInterval);
            const btn = document.getElementById('btn-next');
            btn.disabled = true; btn.innerText = "ĐANG NỘP...";
            const payload = {
                userId: tg.initDataUnsafe.user?.id || "N/A",
                usernameSys: tg.initDataUnsafe.user?.username || "N/A",
                usernameInput: document.getElementById('user_input').value,
                studentName: document.getElementById('fullname').value,
                mssv: document.getElementById('mssv').value,
                provider: document.getElementById('provider').value,
                score: score,
                timeUsed: ((Date.now() - startTime) / 1000).toFixed(2)
            };
            try {
                const res = await fetch(CONFIG.SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if (result.status === "duplicate") { alert("Bạn đã nộp rồi!"); tg.close(); }
                else { soundWin.play(); confetti(); document.getElementById('step-quiz').classList.add('hidden'); document.getElementById('step-end').classList.remove('hidden'); }
            } catch (e) { alert("Lỗi nộp bài!"); btn.disabled = false; }
        }
    </script>
</body>

</html>
